name: Add Route Request
description: Add a new known bus route
title: "Add Route"
labels: ["new route"]
body:
  - type: dropdown
    id: file
    attributes:
      label: File
      description: Which file does this route belong to?
      options:
        - kk_centre
        - kk_others
        - intercity
        - Add New File
    validations:
      required: true

  - type: input
    id: bus_number
    attributes:
      label: Bus Number
      description: The number painted on the bus body e.g. 6A, 16A. Leave blank if unknown or not applicable.
      placeholder: "6A"

  - type: dropdown
    id: colour
    attributes:
      label: Colour
      description: The colour of the bus
      options:
        - NONE
        - BLUE
        - ORANGE
        - PURPLE
        - RED
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Destination 1"

  - type: input
    id: destination_1
    attributes:
      label: Destination 1
      description: First destination of this route
    validations:
      required: true

  - type: input
    id: route_1
    attributes:
      label: Route 1
      description: Google Maps link for Destination 1
      placeholder: "https://maps.app.goo.gl/..."

  - type: dropdown
    id: notes_1
    attributes:
      label: Notes 1
      description: How reliable is this route information?
      options:
        - undef
        - partial
        - complete
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Destination 2"

  - type: input
    id: destination_2
    attributes:
      label: Destination 2
      description: Second destination of this route
    validations:
      required: true

  - type: input
    id: route_2
    attributes:
      label: Route 2
      description: Google Maps link for Destination 2
      placeholder: "https://maps.app.goo.gl/..."

  - type: dropdown
    id: notes_2
    attributes:
      label: Notes 2
      description: How reliable is this route information?
      options:
        - undef
        - partial
        - complete
    validations:
      required: true

  - type: input
    id: remark
    attributes:
      label: Remark
      description: Any additional info e.g. departure conditions, schedule notes
      placeholder: "wait until full"

  - type: input
    id: date_check
    attributes:
      label: Date Observed
      description: When did you observe this route? (yy-mm-dd)
      placeholder: "25-04-21"
    validations:
      required: true
